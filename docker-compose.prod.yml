# Production — pulls pre-built image from GHCR
# Required env vars:
#   GHCR_OWNER=your-github-username
# Usage: docker compose -f docker-compose.prod.yml up -d
services:
  mongodb:
    image: mongo:7
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    image: ghcr.io/${GHCR_OWNER}/mirror-in-seconds:latest
    ports:
      - "8080:8080"
    environment:
      MONGODB_URL: mongodb://mongodb:27017/mirrorinseconds
      NODE_ENV: production
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mongodata:
